<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c100e">
<title>TOPOPROG — Survey Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c100e; --bg2:#141b16; --grid:rgba(110,190,140,.055);
  --panel:rgba(22,30,25,.66); --pbord:rgba(150,190,160,.15); --psoft:rgba(255,255,255,.04);
  --ink:#dde6da; --muted:#7e8d7f; --dim:#5d6a5e;
  --amber:#e6a92e; --amberd:#b9831e; --green:#36cf7d; --greend:#1f8e54; --bad:#e0623a;
  --field:rgba(0,0,0,.3); --line:rgba(150,190,160,.15);
  --glow:0 0 18px rgba(54,207,125,.35);
  --disp:"Oswald","Arial Narrow",Impact,sans-serif;
  --body:"Space Grotesk",system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
}
html[data-theme="light"]{
  --bg:#e9ede7; --bg2:#f3f6f1; --grid:rgba(30,60,40,.05);
  --panel:rgba(255,255,255,.82); --pbord:rgba(20,40,30,.1); --psoft:rgba(20,40,30,.03);
  --ink:#16201a; --muted:#566357; --dim:#8a988b;
  --amber:#9a6f12; --amberd:#7c5a0e; --green:#188a4f; --greend:#0f6e3c; --bad:#c0481f;
  --field:#ffffff; --line:rgba(20,40,30,.13);
  --glow:0 0 0 3px rgba(24,138,79,.16);
}
html[data-theme="night"]{
  --bg:#000; --bg2:#0a0302; --grid:rgba(255,50,35,.06);
  --panel:rgba(24,6,4,.7); --pbord:rgba(255,60,40,.18); --psoft:rgba(255,60,40,.04);
  --ink:#ff6650; --muted:#9a3b2c; --dim:#6e2418;
  --amber:#ff7a44; --amberd:#c2502a; --green:#ff5238; --greend:#b8301c; --bad:#ff4422;
  --field:#190504; --line:rgba(255,60,40,.16);
  --glow:0 0 16px rgba(255,82,56,.4);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:var(--body); color:var(--ink); background:var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    radial-gradient(130% 90% at 50% -10%, var(--bg2), var(--bg) 62%);
  background-size:38px 38px,38px 38px,100% 100%;
  -webkit-text-size-adjust:100%; min-height:100dvh; transition:background-color .3s,color .3s;
}
.wrap{max-width:580px;margin:0 auto;padding:0 14px calc(30px + env(safe-area-inset-bottom))}

/* header */
header{display:flex;align-items:center;gap:13px;padding:18px 2px 8px}
.badge{position:relative;width:50px;height:50px;flex:none;display:grid;place-items:center;border-radius:50%;
  background:radial-gradient(circle at 50% 38%, var(--psoft), transparent 70%);
  border:1px solid var(--pbord)}
.badge::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--amber);
  opacity:.35;mask:linear-gradient(#000,#000) ;clip-path:polygon(0 0,100% 0,100% 18%,0 18%,0 0,0 82%,100% 82%,100% 100%,0 100%)}
.badge img{width:40px;height:40px;object-fit:contain;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.55))}
html[data-theme="night"] .badge img{filter:grayscale(1) sepia(1) hue-rotate(-22deg) saturate(7) brightness(.85)}
.brand{flex:1;min-width:0}
.brand h1{font-family:var(--disp);font-weight:700;letter-spacing:.2em;font-size:25px;line-height:1;
  margin:0;color:var(--amber);text-transform:uppercase;text-shadow:0 0 22px rgba(230,169,46,.18)}
.brand .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.26em;color:var(--muted);
  text-transform:uppercase;margin-top:5px}
.theme-btn{flex:none;width:42px;height:42px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);cursor:pointer;font-size:17px;line-height:1;
  display:grid;place-items:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.theme-btn:active{transform:translateY(1px)}

/* status strip */
.strip{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9.5px;
  letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:7px 2px;margin:6px 0 14px}
.strip .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:var(--glow)}
.strip .grow{flex:1}

/* mil system */
.milsys{display:flex;gap:6px;margin-bottom:14px}
.milsys button{flex:1;font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.05em;
  padding:11px 8px;border:1px solid var(--line);border-radius:11px;background:var(--panel);
  color:var(--muted);cursor:pointer;text-transform:uppercase;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.milsys button small{display:block;font-weight:400;font-size:9px;letter-spacing:.14em;opacity:.7;margin-top:3px}
.milsys button[aria-pressed="true"]{color:var(--bg);border-color:var(--green);
  background:linear-gradient(180deg,var(--green),var(--greend));box-shadow:var(--glow)}
html[data-theme="light"] .milsys button[aria-pressed="true"]{color:#fff}

/* tabs */
.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}
.tab{font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.05em;text-transform:uppercase;
  padding:12px 10px;border:1px solid var(--line);border-radius:12px;background:var(--panel);
  color:var(--ink);cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);position:relative;overflow:hidden}
.tab .ar{font-family:var(--body);font-weight:400;font-size:10.5px;letter-spacing:0;color:var(--muted);direction:rtl}
.tab[aria-selected="true"]{border-color:var(--amber);color:var(--amber)}
.tab[aria-selected="true"]::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber)}
.tab[aria-selected="true"] .ar{color:var(--amberd)}

/* card */
.card{background:var(--panel);border:1px solid var(--pbord);border-radius:16px;padding:17px 16px 18px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 14px 40px -22px rgba(0,0,0,.7)}
.card h2{font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.07em;
  font-size:18px;margin:0 0 3px;color:var(--ink)}
.card .desc{font-size:12.5px;color:var(--muted);margin:0 0 15px;line-height:1.5}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px 12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--ink);
  display:flex;align-items:baseline;gap:6px}
.field label .hint{font-family:var(--body);font-weight:400;font-size:10px;color:var(--muted);letter-spacing:0}
.field input{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--ink);background:var(--field);
  border:1px solid var(--line);border-radius:10px;padding:11px 12px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:var(--green);box-shadow:var(--glow)}
.field input::placeholder{color:var(--dim)}

.subhead{grid-column:1/-1;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:var(--amber);margin:9px 0 -1px;display:flex;align-items:center;gap:9px}
.subhead::after{content:"";height:1px;flex:1;background:var(--line)}

.go{width:100%;margin-top:17px;font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--bg);border:0;border-radius:11px;padding:14px;cursor:pointer;
  background:linear-gradient(180deg,var(--green),var(--greend));box-shadow:var(--glow)}
html[data-theme="light"] .go{color:#fff}
.go:active{transform:translateY(1px)}

.result{margin-top:17px;display:none}
.result.show{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.err{margin-top:14px;display:none;font-family:var(--mono);font-size:12.5px;color:#fff;
  background:var(--bad);border-radius:10px;padding:11px 13px;line-height:1.4}
.err.show{display:block}
.viz{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin:2px 0 15px}
.viz svg{background:var(--field);border:1px solid var(--line);border-radius:13px}
.readout{display:grid;gap:8px;grid-template-columns:1fr 1fr}
.ro{background:var(--psoft);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
.ro .k{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber)}
.ro .v{font-family:var(--mono);font-size:21px;font-weight:700;color:var(--ink);margin-top:4px}
.ro .u{font-size:11px;font-weight:400;color:var(--muted)}

footer{margin-top:24px;text-align:center;font-family:var(--mono);font-size:10.5px;
  letter-spacing:.12em;color:var(--muted);text-transform:uppercase;line-height:1.8}
footer .name{color:var(--amber);font-weight:700}
footer .ar{color:var(--green)}
@media (max-width:380px){.brand h1{font-size:21px}.tab{font-size:12.5px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge"><img id="emblem" alt="Lebanese Armed Forces emblem"></div>
    <div class="brand">
      <h1>Topoprog</h1>
      <div class="sub">Topographic Survey Terminal</div>
    </div>
    <button class="theme-btn" id="themeBtn" title="Switch theme (dark / light / night)" aria-label="Switch theme">◐</button>
  </header>

  <div class="strip">
    <span class="dot"></span><span id="stripSys">MIL 6400 · WESTERN</span>
    <span class="grow"></span><span>COGO READY</span>
  </div>

  <div class="milsys" role="group" aria-label="Millième system">
    <button id="sysW" aria-pressed="true">Western millième<small>6400 / circle</small></button>
    <button id="sysE" aria-pressed="false">Eastern millième<small>6000 / circle</small></button>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" data-mod="gisdist" aria-selected="true">
      <span class="lbl">Gisement · Distance</span><span class="ar">الاتجاه والمسافة</span></button>
    <button class="tab" role="tab" data-mod="rayon" aria-selected="false">
      <span class="lbl">Rayonnement</span><span class="ar">الإشعاع</span></button>
    <button class="tab" role="tab" data-mod="inter" aria-selected="false">
      <span class="lbl">Intersection</span><span class="ar">التقاطع</span></button>
    <button class="tab" role="tab" data-mod="relev" aria-selected="false">
      <span class="lbl">Relèvement</span><span class="ar">الرصد العكسي</span></button>
  </div>

  <div id="mount"></div>

  <footer>
    <span class="name">Maj. Elie Freiha</span> &nbsp;·&nbsp; <span class="ar">الجيش اللبناني</span><br>
    Web edition — works offline
  </footer>
</div>

const mil2rad = m => m*Math.PI/App.half;
const rad2mil = r => r*App.half/Math.PI;
const norm = m => ((m%App.full)+App.full)%App.full;
const num = v => { const x=parseFloat(String(v).replace(",",".")); if(!isFinite(x)) throw new Error("field"); return x; };
const fmt = (x,d=2) => (isFinite(x)?x.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}):"—");

/* ---- COGO ---- */
function calcGisDist(v){
  const Xs=num(v.Xs),Ys=num(v.Ys),Xa=num(v.Xa),Ya=num(v.Ya);
  const dist=Math.hypot(Xa-Xs,Ya-Ys);
  let g=Math.atan2(Xa-Xs,Ya-Ys); if(g<0)g+=2*Math.PI;
  return {dist,gis:norm(rad2mil(g))};
}
function calcRayon(v){
  const Xa=num(v.Xa),Ya=num(v.Ya),Za=num(v.Za);
  const G=norm(num(v.G)),D=num(v.D),Si=num(v.Si);
  const Grad=mil2rad(G),Sr=mil2rad(Si);
  const Dh=D*Math.cos(Sr), dz=Dh*Math.tan(Sr);
  return {Xs:Xa+Dh*Math.sin(Grad),Ys:Ya+Dh*Math.cos(Grad),Zs:Za+dz,Dh,gis:G};
}
function calcInter(v){
  const Xa=num(v.Xa),Ya=num(v.Ya),Xb=num(v.Xb),Yb=num(v.Yb);
  const ga=mil2rad(norm(num(v.Ga))),gb=mil2rad(norm(num(v.Gb)));
  const dA=[Math.sin(ga),Math.cos(ga)],dB=[Math.sin(gb),Math.cos(gb)];
  const den=dA[0]*dB[1]-dA[1]*dB[0];
  if(Math.abs(den)<1e-12) throw new Error("parallel");
  const t=((Xb-Xa)*dB[1]-(Yb-Ya)*dB[0])/den;
  return {Xs:Xa+t*dA[0],Ys:Ya+t*dA[1]};
}
function calcRelev(v){
  const Ax=num(v.Ax),Ay=num(v.Ay),Bx=num(v.Bx),By=num(v.By),Cx=num(v.Cx),Cy=num(v.Cy);
  const a=mil2rad(num(v.A1)),b=mil2rad(num(v.A2));
  const ta=Math.tan(a),tb=Math.tan(b);
  const k1=((((Ay-Cy)*(1/ta)+(Cx-Bx))*tb-(Ay-By))/(((Ax-Cx)*(1/ta)+(By-Cy))*tb-(Ax-Bx)));
  const k2=(tb+k1)/(1-tb*k1);
  const Ys=((((Bx-Ax)*k2)-(By-Ay))/(k2-k1))+Ax;
  const Xs=((Ys-Ax)*k1)+Ay;
  return {Xs,Ys};
}

/* ---- visualizations (modern HUD) ---- */
function dial(gis){
  const S=176,c=S/2,R=72,full=App.full,step=full/64;
  let t="";
  for(let i=0;i<64;i++){
    const m=i*step,big=(i%8===0),mid=(i%4===0),a=(m/full)*2*Math.PI,len=big?13:(mid?8:4);
    const x1=c+Math.sin(a)*R,y1=c-Math.cos(a)*R,x2=c+Math.sin(a)*(R-len),y2=c-Math.cos(a)*(R-len);
    t+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--muted)" stroke-width="${big?1.5:.8}" opacity="${big?.95:.45}"/>`;
    if(big){const lx=c+Math.sin(a)*(R-27),ly=c-Math.cos(a)*(R-27);
      t+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" font-size="8" font-family="var(--mono)" fill="var(--muted)" text-anchor="middle">${m}</text>`;}
  }
  const a=(norm(gis)/full)*2*Math.PI;
  const nx=c+Math.sin(a)*(R-15),ny=c-Math.cos(a)*(R-15),tx=c-Math.sin(a)*20,ty=c+Math.cos(a)*20;
  return `<svg viewBox="0 0 ${S} ${S}" width="160" height="160" role="img" aria-label="bearing dial">
    <defs><filter id="ng" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <circle cx="${c}" cy="${c}" r="${R}" fill="none" stroke="var(--amber)" stroke-width="1.3" opacity=".85"/>
    <circle cx="${c}" cy="${c}" r="${R-19}" fill="none" stroke="var(--line)" stroke-width=".7"/>
    ${t}
    <line x1="${tx.toFixed(1)}" y1="${ty.toFixed(1)}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="var(--green)" stroke-width="2.6" stroke-linecap="round" filter="url(#ng)"/>
    <circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="3.6" fill="var(--green)" filter="url(#ng)"/>
    <circle cx="${c}" cy="${c}" r="3.2" fill="var(--amber)"/>
    <text x="${c}" y="${c-R+3}" font-size="9" font-family="var(--mono)" fill="var(--green)" text-anchor="middle" font-weight="700">N</text>
    <text x="${c}" y="${c+1}" font-size="16" font-family="var(--mono)" font-weight="700" fill="var(--ink)" text-anchor="middle">${Math.round(norm(gis))}</text>
    <text x="${c}" y="${c+13}" font-size="7" font-family="var(--mono)" fill="var(--muted)" text-anchor="middle" letter-spacing="1">MIL</text>
  </svg>`;
}
function plot(points){
  const S=176,pad=22;
  const xs=points.map(p=>p.x),ys=points.map(p=>p.y);
  let minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  const sp=Math.max(maxx-minx,maxy-miny,1)*1.3,cx=(minx+maxx)/2,cy=(miny+maxy)/2;
  minx=cx-sp/2;maxx=cx+sp/2;miny=cy-sp/2;maxy=cy+sp/2;
  const X=v=>pad+((v-minx)/(maxx-minx))*(S-2*pad);
  const Y=v=>S-pad-((v-miny)/(maxy-miny))*(S-2*pad);
  let g="";
  for(let i=0;i<=4;i++){const gp=pad+i*(S-2*pad)/4;
    g+=`<line x1="${gp}" y1="${pad}" x2="${gp}" y2="${S-pad}" stroke="var(--line)" stroke-width=".5" opacity=".55"/><line x1="${pad}" y1="${gp}" x2="${S-pad}" y2="${gp}" stroke="var(--line)" stroke-width=".5" opacity=".55"/>`;}
  const res=points.find(p=>p.kind==="result");
  let lines="";
  if(res)points.forEach(p=>{if(p.kind!=="result")lines+=`<line x1="${X(p.x)}" y1="${Y(p.y)}" x2="${X(res.x)}" y2="${Y(res.y)}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="3 3" opacity=".75"/>`;});
  let marks="";
  points.forEach(p=>{const col=p.kind==="result"?"var(--green)":(p.kind==="station"?"var(--amber)":"var(--muted)");const r=p.kind==="result"?5:4;
    const flt=p.kind==="result"?' filter="url(#pg)"':'';
    marks+=`<circle cx="${X(p.x)}" cy="${Y(p.y)}" r="${r}" fill="${col}"${flt}/><text x="${X(p.x)+7}" y="${Y(p.y)+3}" font-size="9" font-family="var(--mono)" font-weight="700" fill="var(--ink)">${p.name}</text>`;});
  return `<svg viewBox="0 0 ${S} ${S}" width="160" height="160" role="img" aria-label="plan view">
    <defs><filter id="pg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <rect x="${pad}" y="${pad}" width="${S-2*pad}" height="${S-2*pad}" fill="none" stroke="var(--amber)" stroke-width="1" opacity=".7"/>
    ${g}${lines}${marks}
    <text x="${S-pad}" y="${S-pad+13}" font-size="8" font-family="var(--mono)" fill="var(--muted)" text-anchor="end">E →</text>
    <text x="${pad-14}" y="${pad+4}" font-size="8" font-family="var(--mono)" fill="var(--muted)">N↑</text>
  </svg>`;
}

/* ---- modules ---- */
const G_HINT=()=>`mil 0–${App.full}`;
const MODULES={
  gisdist:{title:"Gisement & Distance",desc:"Grid bearing and horizontal distance from a station S to a point A.",
    sections:[{head:"Station S",fields:[["Xs","Xs","Easting"],["Ys","Ys","Northing"]]},
              {head:"Point A",fields:[["Xa","Xa","Easting"],["Ya","Ya","Northing"]]}],
    run(v){const r=calcGisDist(v);return{readouts:[["Distance",fmt(r.dist),"m"],["Gisement S→A",fmt(r.gis),"mil"]],
      viz:dial(r.gis)+plot([{name:"S",x:num(v.Xs),y:num(v.Ys),kind:"station"},{name:"A",x:num(v.Xa),y:num(v.Ya),kind:"result"}])};}},
  rayon:{title:"Rayonnement",desc:"Compute a new point S from a known station A given bearing, slope distance and site (vertical) angle.",
    sections:[{head:"Station A",fields:[["Xa","Xa","Easting"],["Ya","Ya","Northing"],["Za","Za","Elevation"]]},
              {head:"Observation A→S",fields:[["G","Gisement",G_HINT()],["D","Distance","slope, m"],["Si","Site","vert. mil"]]}],
    run(v){const r=calcRayon(v);return{readouts:[["Xs",fmt(r.Xs),""],["Ys",fmt(r.Ys),""],["Zs",fmt(r.Zs),""],["Horiz. dist",fmt(r.Dh),"m"]],
      viz:dial(r.gis)+plot([{name:"A",x:num(v.Xa),y:num(v.Ya),kind:"station"},{name:"S",x:r.Xs,y:r.Ys,kind:"result"}])};}},
  inter:{title:"Intersection",desc:"Locate a point S sighted from two known stations A and B by their grid bearings.",
    sections:[{head:"Station A",fields:[["Xa","Xa","Easting"],["Ya","Ya","Northing"]]},
              {head:"Station B",fields:[["Xb","Xb","Easting"],["Yb","Yb","Northing"]]},
              {head:"Bearings",fields:[["Ga","Ga (A→S)",G_HINT()],["Gb","Gb (B→S)",G_HINT()]]}],
    run(v){const r=calcInter(v);return{readouts:[["Xs",fmt(r.Xs),""],["Ys",fmt(r.Ys),""]],
      viz:plot([{name:"A",x:num(v.Xa),y:num(v.Ya),kind:"ref"},{name:"B",x:num(v.Xb),y:num(v.Yb),kind:"ref"},{name:"S",x:r.Xs,y:r.Ys,kind:"result"}])};}},
  relev:{title:"Relèvement",desc:"Resection — find the observer's position S from three known points A, B, C and two measured angles α (A–B) and β (A–C).",
    sections:[{head:"Point A",fields:[["Ax","Xa","Easting"],["Ay","Ya","Northing"]]},
              {head:"Point B",fields:[["Bx","Xb","Easting"],["By","Yb","Northing"]]},
              {head:"Point C",fields:[["Cx","Xc","Easting"],["Cy","Yc","Northing"]]},
              {head:"Observed angles",fields:[["A1","α  (A–B)",G_HINT()],["A2","β  (A–C)",G_HINT()]]}],
    run(v){const r=calcRelev(v);return{readouts:[["Xs",fmt(r.Xs),""],["Ys",fmt(r.Ys),""]],
      viz:plot([{name:"A",x:num(v.Ax),y:num(v.Ay),kind:"ref"},{name:"B",x:num(v.Bx),y:num(v.By),kind:"ref"},{name:"C",x:num(v.Cx),y:num(v.Cy),kind:"ref"},{name:"S",x:r.Xs,y:r.Ys,kind:"result"}])};}}
};

/* ---- render ---- */
const mount=document.getElementById("mount");
function renderModule(){
  const m=MODULES[App.mod];let body="";
  m.sections.forEach(sec=>{body+=`<div class="subhead">${sec.head}</div>`;
    sec.fields.forEach(f=>{const[k,lab,hint]=f;
      body+=`<div class="field"><label>${lab}${hint?` <span class="hint">${hint}</span>`:""}</label><input inputmode="decimal" autocomplete="off" data-k="${k}" placeholder="0.00"></div>`;});});
  mount.innerHTML=`<div class="card"><h2>${m.title}</h2><p class="desc">${m.desc}</p>
    <div class="grid2">${body}</div><button class="go" id="goBtn">Calculate</button>
    <div class="err" id="err"></div><div class="result" id="res"></div></div>`;
  document.getElementById("goBtn").addEventListener("click",doCalc);
  mount.querySelectorAll("input").forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter")doCalc();}));
}
function readForm(){const v={};mount.querySelectorAll("input").forEach(i=>v[i.dataset.k]=i.value.trim());return v;}
function doCalc(){
  const err=document.getElementById("err"),res=document.getElementById("res");
  err.classList.remove("show");res.classList.remove("show");
  let out;try{out=MODULES[App.mod].run(readForm());}
  catch(e){err.textContent=e.message==="parallel"?"The two bearings are parallel — no intersection. Check Ga and Gb.":"Enter valid numbers in every field.";err.classList.add("show");return;}
  const ro=out.readouts.map(r=>`<div class="ro"><div class="k">${r[0]}</div><div class="v">${r[1]}${r[2]?` <span class="u">${r[2]}</span>`:""}</div></div>`).join("");
  res.innerHTML=`<div class="viz">${out.viz}</div><div class="readout">${ro}</div>`;
  res.classList.add("show");res.scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* ---- controls ---- */
const sysW=document.getElementById("sysW"),sysE=document.getElementById("sysE"),strip=document.getElementById("stripSys");
function setSystem(full){App.full=full;sysW.setAttribute("aria-pressed",full===6400);sysE.setAttribute("aria-pressed",full===6000);
  strip.textContent=`MIL ${full} · ${full===6400?"WESTERN":"EASTERN"}`;
  try{localStorage.setItem("tp_full",full);}catch(e){}renderModule();}
sysW.addEventListener("click",()=>setSystem(6400));sysE.addEventListener("click",()=>setSystem(6000));
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{App.mod=t.dataset.mod;
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x===t));renderModule();}));
const themeBtn=document.getElementById("themeBtn"),order=["dark","light","night"],icon={dark:"◐",light:"☀",night:"◑"};
function setTheme(name){App.theme=name;document.documentElement.dataset.theme=name;themeBtn.textContent=icon[name];
  const mt=document.querySelector('meta[name=theme-color]');if(mt)mt.content=getComputedStyle(document.body).backgroundColor;
  try{localStorage.setItem("tp_theme",name);}catch(e){}}
themeBtn.addEventListener("click",()=>setTheme(order[(order.indexOf(App.theme)+1)%order.length]));

/* ---- init ---- */
document.getElementById("emblem").src="data:image/png;base64,"+document.getElementById("emblemData").textContent.trim();
try{if(localStorage.getItem("tp_full")==="6000")setSystem(6000);
    const th=localStorage.getItem("tp_theme");if(th&&order.includes(th))setTheme(th);}catch(e){}
renderModule();
</script>
</body>
